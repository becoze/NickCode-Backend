# Remote config
server:
  port: 8103
  servlet:
    session:
      cookie:
        max-age: 86400
        http-only: true
        secure: true
        same-site: lax
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/nickcode
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
mybatis-plus:
  configuration:
    log-impl: ''
knife4j:
  enable: false
